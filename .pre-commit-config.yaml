repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: '^.beads/config.yaml$'
      - id: check-merge-conflict
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: treefmt
        name: treefmt --fail-on-change
        entry: treefmt --fail-on-change
        language: system
        stages: [pre-commit]
        pass_filenames: false

      - id: shell-reexec-explicit-interpreter
        name: shell-reexec-explicit-interpreter
        entry: scripts/check-shell-reexec
        language: system
        stages: [pre-commit]
        types: [shell]

      # loom-gate-verify-files removed: binary `--files <PATH>` takes one
      # path, but the hook's `pass_filenames: true` passes every staged
      # file as positional args. Restore once the binary accepts variadic
      # files (`--files <PATH>...`) per its docstring's "file set" intent.

      # loom-gate-verify-marker removed per A1 (specs/pre-commit.md): the
      # marker is consumed by the `pre-push-checks` wrapper per-hook; a
      # standalone gating hook blocks operator-manual pushes that have no
      # marker. The wrapper still validates the marker on every slow-tier
      # hook and short-circuits on driver-loop integration pushes.

      - id: nix-flake-check
        name: nix flake check
        entry: skip-if-missing nix -- nix flake check
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

      - id: cargo-build
        name: cargo build --workspace
        entry: pre-push-checks cargo build --workspace
        language: system
        stages: [pre-push]
        files: '\.rs$'
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy --workspace --all-targets -- -D warnings
        entry: pre-push-checks cargo clippy --workspace --all-targets -- -D warnings
        language: system
        stages: [pre-push]
        files: '\.rs$'
        pass_filenames: false

      - id: cargo-nextest
        name: cargo nextest run --workspace
        entry: pre-push-checks cargo nextest run --workspace
        language: system
        stages: [pre-push]
        files: '\.rs$'
        pass_filenames: false

      - id: loom-gate-verify-diff
        name: loom gate verify --diff
        entry: pre-push-checks loom gate verify --diff HEAD
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

      - id: container-smoke
        name: nix run .#test (container smoke)
        entry: pre-push-checks skip-if-missing nix -- nix run .#test
        language: system
        stages: [pre-push]
        files: '^crates/[^/]+/tests/properties.rs$'
        pass_filenames: false
