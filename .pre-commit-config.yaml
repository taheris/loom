repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: '^.beads/config.yaml$'
      - id: check-merge-conflict
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: treefmt
        name: treefmt --fail-on-change
        entry: treefmt --fail-on-change
        language: system
        stages: [pre-commit]
        pass_filenames: false

      - id: shell-reexec-explicit-interpreter
        name: shell-reexec-explicit-interpreter
        entry: scripts/check-shell-reexec
        language: system
        stages: [pre-commit]
        types: [shell]

      - id: loom-gate-verify-files
        name: loom gate verify --files
        entry: loom gate verify --files
        language: system
        stages: [pre-commit]
        pass_filenames: true

      # The marker is consumed by the `pre-push-checks` wrapper per-hook; a
      # standalone gating hook blocks operator-manual pushes that have no
      # marker. The wrapper still validates the marker on every slow-tier
      # hook and short-circuits on driver-loop integration pushes.

      - id: nix-flake-check
        name: nix flake check
        entry: skip-if-missing nix -- pre-push-checks nix flake check
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy --workspace --all-targets -- -D warnings
        entry: pre-push-checks cargo clippy --workspace --all-targets -- -D warnings
        language: system
        stages: [pre-push]
        files: '\.rs$'
        pass_filenames: false

      - id: loom-gate-verify-diff
        name: loom gate verify --diff
        entry: pre-push-checks loom gate verify --diff '@{u}..HEAD'
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

      - id: container-smoke
        name: nix run .#test (container smoke)
        entry: pre-push-checks skip-if-missing nix -- nix run .#test
        language: system
        stages: [pre-push]
        files: '^crates/[^/]+/tests/properties.rs$'
        pass_filenames: false
